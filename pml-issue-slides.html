const issues = [
{id:"1",sev:"P0",cat:"data-loss",title:"SQS AUTO_ACKNOWLEDGE on PaymentDisbursalConsumer",file:"eq-fms-consumers/.../sqs/PaymentDisbursalConsumer.java",
problem:"Uses <code>Session.AUTO_ACKNOWLEDGE</code> which deletes the SQS message the instant it's received — <strong>before</strong> <code>onMessage()</code> processes it. If processing fails (exception, OOM, pod crash), the payment disbursal record is permanently lost. Money is disbursed via RupeeSeed but the database is never updated.",
code:`Session session = connection.createSession(\n    false, Session.AUTO_ACKNOWLEDGE  // ← deletes before processing\n);\n\n@Override\npublic void onMessage(Message message) {\n    try {\n        processPayment(message);  // if this throws...\n    } catch (Exception e) {\n        log.error("[eventMessage] [Exception]", e);\n        // message already gone from SQS — no retry, no DLQ\n    }\n}`,
fix:["Change to <code>Session.CLIENT_ACKNOWLEDGE</code>","Call <code>message.acknowledge()</code> only after successful processing","Configure DLQ on SQS queue (maxReceiveCount=3)","Add Micrometer counters for received/processed/failed"]},

{id:"2",sev:"P0",cat:"data-loss",title:"SQS AUTO_ACKNOWLEDGE on UPIMandateConsumer",file:"eq-fms-consumers/.../sqs/UPIMandateConsumer.java",
problem:"Same AUTO_ACKNOWLEDGE pattern. UPI mandate status updates (register, revoke, pause) are lost if processing fails. Customer's mandate shows wrong state — active when revoked, or revoked when active.",
code:`// Same pattern as all 17 consumers:\nSession session = connection.createSession(\n    false, Session.AUTO_ACKNOWLEDGE\n);`,
fix:["Switch to CLIENT_ACKNOWLEDGE","Add DLQ for failed mandate updates","Add monitoring for mandate status mismatches"]},

{id:"3",sev:"P0",cat:"data-loss",title:"SQS AUTO_ACKNOWLEDGE on SettlementCommConsumer",file:"eq-fms-consumers/.../sqs/SettlementCommConsumer.java",
problem:"Settlement communication messages deleted before processing. If the consumer crashes, settlement notifications to clearing houses vanish — causing reconciliation failures and potential SEBI reporting gaps.",
code:`// Settlement notifications permanently lost on failure\nSession.AUTO_ACKNOWLEDGE  // deletes before onMessage()`,
fix:["Switch to CLIENT_ACKNOWLEDGE with DLQ","Add settlement notification delivery tracking","Alert on failed settlement communications"]},

{id:"4",sev:"P0",cat:"data-loss",title:"SQS AUTO_ACKNOWLEDGE on BlockTransactionConsumer",file:"eq-fms-consumers/.../sqs/BlockTransactionConsumer.java",
problem:"Fund block status updates lost on processing failure. If a block transaction message is lost, funds that should be blocked remain available for trading — or blocked funds are never released.",
code:`// Fund block status disappears on error\nSession.AUTO_ACKNOWLEDGE`,
fix:["Switch to CLIENT_ACKNOWLEDGE","Add fund block status reconciliation job","Monitor for orphaned block transactions"]},

{id:"5",sev:"P0",cat:"data-loss",title:"SQS AUTO_ACKNOWLEDGE on PayInClearanceConsumer",file:"eq-fms-consumers/.../sqs/PayInClearanceConsumer.java",
problem:"PayIn clearance messages lost before processing. Customer deposits money but clearance status never updates — funds stuck in 'pending' state indefinitely. No auto-recovery mechanism.",
code:`// Payment clearance not recorded on failure\nSession.AUTO_ACKNOWLEDGE`,
fix:["Switch to CLIENT_ACKNOWLEDGE","Add clearance status reconciliation","Alert on payments stuck in pending > 30 min"]},

{id:"6",sev:"P0",cat:"data-loss",title:"SQS AUTO_ACKNOWLEDGE on TechExcelSyncConsumer",file:"eq-fms-consumers/.../sqs/TechExcelSyncConsumer.java",
problem:"Back-office transaction sync messages lost. TechExcel BO system and PML database get out of sync. Trade records exist in one system but not the other — reconciliation nightmare.",
code:`// BO transaction sync lost on failure\nSession.AUTO_ACKNOWLEDGE`,
fix:["Switch to CLIENT_ACKNOWLEDGE","Add bi-directional sync verification job","Alert on sync lag > threshold"]},

{id:"7",sev:"P0",cat:"data-loss",title:"SQS AUTO_ACKNOWLEDGE on MarginPledgeConsumer",file:"eq-fms-consumers/.../sqs/MarginPledgeConsumer.java",
problem:"Margin pledge/unpledge status updates lost. Securities pledged as margin collateral may show wrong state — pledged when unpledged or vice versa. Affects margin calculation and trading limits.",
code:`// Pledge status not updated on failure\nSession.AUTO_ACKNOWLEDGE`,
fix:["Switch to CLIENT_ACKNOWLEDGE","Add pledge status reconciliation with depository","Monitor pledge count mismatches"]},

{id:"8",sev:"P0",cat:"data-loss",title:"SQS AUTO_ACKNOWLEDGE on WithdrawalConsumer",file:"eq-fms-consumers/.../sqs/WithdrawalConsumer.java",
problem:"Withdrawal status updates lost. Money sent to bank but withdrawal status never updates — customer sees 'processing' forever. Or worse, withdrawal completed but balance not deducted — customer can withdraw again.",
code:`// Withdrawal status lost on failure\nSession.AUTO_ACKNOWLEDGE`,
fix:["Switch to CLIENT_ACKNOWLEDGE","Add withdrawal reconciliation with bank","Alert on withdrawals stuck in processing"]},

{id:"9",sev:"P0",cat:"data-loss",title:"SQS AUTO_ACKNOWLEDGE on FundTransferConsumer",file:"eq-fms-consumers/.../sqs/FundTransferConsumer.java",
problem:"Inter-segment fund transfer records lost. Transfer between equity and commodity segments may execute but records are not updated — causing balance mismatches across segments.",
code:`// Fund transfer records missing on failure\nSession.AUTO_ACKNOWLEDGE`,
fix:["Switch to CLIENT_ACKNOWLEDGE","Add cross-segment balance reconciliation","Implement idempotent transfer processing"]},

{id:"10",sev:"P0",cat:"data-loss",title:"SQS AUTO_ACKNOWLEDGE on IPOAllotmentConsumer",file:"eq-fms-consumers/.../sqs/IPOAllotmentConsumer.java",
problem:"IPO allotment data lost on processing failure. Customer's IPO application succeeds at exchange but allotment status never reflects in app. Customer may apply again causing duplicate applications.",
code:`// IPO allotment data not persisted on failure\nSession.AUTO_ACKNOWLEDGE`,
fix:["Switch to CLIENT_ACKNOWLEDGE","Add allotment reconciliation with registrar","Monitor allotment count vs application count"]},

{id:"11-17",sev:"P0",cat:"data-loss",title:"SQS AUTO_ACKNOWLEDGE on 7 more consumers",file:"eq-fms-consumers/.../sqs/ (all remaining consumers)",
problem:"The same AUTO_ACKNOWLEDGE pattern is used across <strong>all 17 SQS consumers</strong> in the eq-fms-consumers service. Every consumer has the identical vulnerability — message deleted before processing. This is a systemic design flaw, not an isolated bug.",
code:`// Pattern found in ALL 17 consumers:\nSession session = connection.createSession(\n    false, Session.AUTO_ACKNOWLEDGE  // systemic flaw\n);\n// Zero consumers use CLIENT_ACKNOWLEDGE\n// Zero consumers have DLQ configured\n// Zero consumers have processing metrics`,
fix:["Create shared base consumer class with CLIENT_ACKNOWLEDGE","Configure DLQs on all 17 SQS queues","Add Micrometer metrics to base class","Add health check for SQS connectivity"]},

{id:"18",sev:"P0",cat:"financial",title:"new BigDecimal(double) — 150 sites in 79 files",file:"UtilityService.java (+ 78 files)",
problem:"<code>new BigDecimal(0.1)</code> creates <code>0.1000000000000000055511151231257827021181583404541015625</code> — not <code>0.1</code>. This IEEE 754 imprecision propagates through all financial calculations: charges, GST, brokerage, settlement amounts. Found <strong>150 times in 79 files</strong>.",
code:`// Found 150 times across 79 files:\nBigDecimal value = new BigDecimal(doubleValue);\n// Preserves ALL 53 bits of imprecision\n\n// Correct approach:\nBigDecimal value = BigDecimal.valueOf(doubleValue);\n// Uses String internally — no IEEE 754 contamination`,
fix:["Replace all <code>new BigDecimal(double)</code> with <code>BigDecimal.valueOf(double)</code>","Add Checkstyle/ErrorProne rule to prevent reintroduction","Audit all financial calculations for precision"]},

{id:"19",sev:"P0",cat:"financial",title:"RoundingMode.CEILING in charge calculations",file:"ChargesInfoServiceImpl.java",
problem:"6 usages of <code>RoundingMode.CEILING</code> for GST/charge calculations. CEILING always rounds UP — Rs 10.001 becomes Rs 10.01. This systematically overcharges customers. Back-office uses HALF_UP, creating irreconcilable differences.",
code:`// ChargesInfoServiceImpl.java — 6 CEILING usages\nBigDecimal gst = chargeAmount\n    .multiply(GST_RATE)\n    .setScale(2, RoundingMode.CEILING);  // always rounds UP\n// Customer charged Rs 10.01 when HALF_UP gives Rs 10.00\n// BO records Rs 10.00 — difference never reconciles`,
fix:["Replace CEILING with HALF_UP across all charge calculations","Standardize rounding mode in a shared constant","Add reconciliation check between FMS and BO charges"]},

{id:"20",sev:"P0",cat:"financial",title:"Thread-unsafe ChargesInfoServiceImpl singleton",file:"ChargesInfoServiceImpl.java",
problem:"<code>@Service</code> singleton stores calculation state in <strong>instance variables</strong> (<code>exchangesTurnOverCharge</code>, <code>sebiFeesCharge</code>). Under concurrency, Thread A's exchange charge is overwritten by Thread B — both customers get wrong GST.",
code:`@Service  // singleton!\npublic class ChargesInfoServiceImpl {\n    private double exchangesTurnOverCharge;  // shared!\n    private double sebiFeesCharge;           // shared!\n\n    public void calculateCharges(Order order) {\n        this.exchangesTurnOverCharge = ...;  // Thread A writes\n        // Thread B overwrites here!\n        this.sebiFeesCharge = ...;\n        BigDecimal gst = computeGST();  // uses wrong values\n    }\n}`,
fix:["Convert instance variables to local variables in method","Or use <code>@Scope(\"prototype\")</code> or <code>@RequestScope</code>","Add thread-safety tests with concurrent order processing"]},

{id:"21",sev:"P0",cat:"financial",title:"Float used for Last Traded Price",file:"pml-core-dnd-aggregator",
problem:"LTP stored as <code>Float</code> (32-bit). Float has only 7 significant digits. Rs 99,999.99 becomes Rs 100,000.00 (rounded). This affects P&L calculations for every user's portfolio display.",
code:`// pml-core-dnd-aggregator\nFloat ltp;  // 32-bit — only 7 significant digits!\n\n// Rs 10,000.50 stored as 10000.5f → OK\n// Rs 99,999.99 stored as 99999.992f → rounds to 100000.00\n// Rs 1,50,000.75 stored as 150000.77f → 2 paise error`,
fix:["Change <code>Float ltp</code> to <code>BigDecimal ltp</code>","Update all LTP consumers to use BigDecimal","Add validation that LTP precision is preserved"]},

{id:"22",sev:"P0",cat:"financial",title:"AtomicReference<Double> for ledger aggregation",file:"LedgerServiceImpl.java",
problem:"Uses <code>AtomicReference&lt;Double&gt;</code> for running totals in ledger calculations. While thread-safe for CAS operations, the <strong>Double precision</strong> means every addition compounds IEEE 754 errors. Over 1000 transactions, cumulative error can reach paisa-level.",
code:`// LedgerServiceImpl.java\nAtomicReference<Double> runningTotal = new AtomicReference<>(0.0);\n\n// Each addition compounds floating-point error:\n// 0.1 + 0.2 = 0.30000000000000004\n// After 1000 txns: error ≈ 0.01 (1 paisa)`,
fix:["Replace with <code>AtomicReference&lt;BigDecimal&gt;</code>","Or use <code>BigDecimal</code> with synchronized block","Ensure all ledger math uses BigDecimal throughout"]},

{id:"23",sev:"P0",cat:"compliance",title:"Zero corporate action handling across 21 services",file:"ALL services",
problem:"No service adjusts cost basis, average buy price, or invested value after stock splits, bonus issues, or dividends. After a 1:5 split, user's avg buy price should drop from Rs 500 to Rs 100, but PML still shows Rs 500 — creating a <strong>phantom Rs 2 lakh loss</strong> on a Rs 50K investment.",
code:`// After 1:5 stock split:\n// Should be:  Avg Price = Rs 100, Qty = 500\n// PML shows:  Avg Price = Rs 500, Qty = 500\n// Displayed P&L: -Rs 2,00,000 (phantom loss!)\n\n// Zero occurrences of "corporate_action", "split",\n// "bonus", "cost_basis_adjust" in the codebase`,
fix:["Build corporate action processing service","Subscribe to exchange corporate action feed","Auto-adjust: cost basis, avg price, quantity, invested value","Backfill historical corporate actions"]},

{id:"36",sev:"P0",cat:"security",title:"Static IV for AES-CBC encryption",file:"DBEncryptionConverter.java",

fix:["Generate random IV per encryption operation","Prepend IV to ciphertext (standard practice)","Re-encrypt all existing data with random IVs","Consider using AES-GCM (authenticated encryption)"]},

{id:"39",sev:"P0",cat:"security",title:"AES/ECB mode in payment encryption",file:"Payment encryption utilities",

{id:"45",sev:"P0",cat:"payments",title:"Thread-unsafe ICICI Cipher singleton",file:"ICICIEncryptionUtil.java",
problem:"<code>@Component</code> singleton stores a <code>Cipher</code> instance variable initialized once in <code>@PostConstruct</code>. <code>javax.crypto.Cipher</code> is NOT thread-safe per JCA specification. Concurrent calls corrupt each other's encryption — garbled data sent to ICICI bank.",
code:`@Component  // Singleton!\npublic class ICICIEncryptionUtil {\n    private Cipher cipher;  // NOT thread-safe!\n\n    @PostConstruct\n    void init() {\n        cipher = Cipher.getInstance("AES/CBC/PKCS5Padding");\n        cipher.init(Cipher.ENCRYPT_MODE, key, iv);\n    }\n\n    public String encrypt(String data) {\n        // Multiple threads call concurrently\n        return Base64.encode(cipher.doFinal(data));\n        // Result: corrupted ciphertext\n    }\n}`,
fix:["Create new Cipher instance per call","Or use <code>ThreadLocal&lt;Cipher&gt;</code>","Add synchronized block as temporary fix","Add concurrent encryption test"]},

// ===== RENDER SLIDES =====
const container = document.getElementById('slides-container');

issues.forEach((issue, idx) => {
  const section = document.createElement('section');
  section.className = 'issue-slide';
  section.id = 'issue-' + issue.id;

  const sevClass = issue.sev === 'P0' ? 'issue-id-p0' : issue.sev === 'P1' ? 'issue-id-p1' : 'issue-id-p2';
  const badgeClass = issue.sev === 'P0' ? 'badge-red' : issue.sev === 'P1' ? 'badge-orange' : 'badge-yellow';
  const catClass = 'cat-' + issue.cat;

  const catLabel = {
    'data-loss':'Data Loss','financial':'Financial','security':'Security',
    'payments':'Payments','compliance':'Compliance','reliability':'Reliability',
    'architecture':'Architecture'
  }[issue.cat] || issue.cat;

  const fixItems = issue.fix.map(f => '<li>' + f + '</li>').join('');

  const codeHtml = issue.code
    ? '<div class="code-block" style="font-size:0.40em; line-height:1.6; margin-top:10px;">' +
      issue.code.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>'
    : '';

  section.innerHTML = `
    <div class="issue-header">
      <span class="issue-id ${sevClass}">#${issue.id}</span>
      <span class="badge ${badgeClass}" style="font-size:0.45em;">${issue.sev}</span>
      <span class="cat-tag ${catClass}">${catLabel}</span>
    </div>
    <div class="issue-title">${issue.title}</div>
    <div class="issue-file">${issue.file}</div>
    <div class="issue-grid">
      <div class="problem-box">
        <p>${issue.problem}</p>
        ${codeHtml}
      </div>
      <div class="fix-box">
        <ul>${fixItems}</ul>
      </div>
    </div>
    <div class="nav-footer">
      <span>Issue ${idx + 1} of ${issues.length}</span>
      <a href="pml-all-issues.html">Full Registry</a>
      <a href="pml-issues.html">Main Deck</a>
    </div>
  `;

  container.appendChild(section);
});
